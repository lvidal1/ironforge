# Consumer services — OpenClaw gateway and future consumers
# These services connect to the inference server running in
# docker-compose.llama.yaml. Restarting this stack does not
# affect the inference layer.

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw@sha256:8ecbd44d788db7048108a712802a98fad3f1f9a8a87f78fb111dc3fd0f8a9ed7
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    command: node dist/index.js gateway --allow-unconfigured --port 18789
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    volumes:
      - openclaw-data:/home/node/.openclaw
    networks:
      - command-center-net

volumes:
  openclaw-data:

networks:
  command-center-net:
    external: true
