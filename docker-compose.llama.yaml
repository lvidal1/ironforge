# Inference Server — standalone
# This service runs independently of consumer services.
# Restarting OpenClaw or other consumers does not affect this container.

services:
  llama-backend:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:8c79e4acf00e403e601278989e1d5144c6882ffc0ddf60bef01f90c213c225dd
    container_name: llama_backend
    restart: unless-stopped
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./models:/models:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf
      --port 8081
      --host 0.0.0.0
      -c 110000
      -t 12
      -ngl 99
      -fa 1
      --parallel 1
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --cache-type-k q8_0
      --cache-type-v q8_0
    networks:
      - command-center-net

networks:
  command-center-net:
    external: true
